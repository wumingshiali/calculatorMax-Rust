name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast checks for iteration: skip GUI feature to save compile time
  fast-check:
    name: Fast check (no GUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          autocrlf: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install sccache
        uses: mozilla/sccache-action@v0.0.4
        with:
          version: "v0.7.4"

      - name: Probe sccache and set wrapper
        shell: bash
        run: |
          set -e
          if sccache --version >/dev/null 2>&1 && sccache --show-stats >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          else
            echo "RUSTC_WRAPPER=" >> $GITHUB_ENV
            echo "SCCACHE_NO_DAEMON=1" >> $GITHUB_ENV
            echo "sccache probe failed, disabling sccache for build."
          fi

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-fast
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock') }}-fast
          restore-keys: |
            ${{ runner.os }}-sccache-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Fast build and tests (no GUI)
        run: |
          cargo check --no-default-features --all-targets --all-features --verbose
          cargo test --no-default-features --verbose

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        autocrlf: false
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        
    - name: Install sccache
      uses: mozilla/sccache-action@v0.0.4
      with:
        version: "v0.7.4"
        
    - name: Probe sccache and set wrapper
      shell: bash
      run: |
        set -e
        if sccache --version >/dev/null 2>&1 && sccache --show-stats >/dev/null 2>&1; then
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        else
          echo "RUSTC_WRAPPER=" >> $GITHUB_ENV
          echo "SCCACHE_NO_DAEMON=1" >> $GITHUB_ENV
          echo "sccache probe failed, disabling sccache for build."
        fi

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Cache sccache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
        key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-sccache-
        
    - name: Build release
      run: cargo build --release --verbose

    - name: Bundle macOS App
      if: matrix.os == 'macos-latest'
      run: |
        cargo install cargo-bundle
        cargo bundle --release

    - name: Package macOS artifact
      if: matrix.os == 'macos-latest'
      run: |
        cd target/bundle/osx
        zip -r calculator-max-macos.zip calculator-max.app

    # === 上传产物 ===
    - name: Upload Linux/Windows artifact
      if: matrix.os != 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: calculator-max-${{ matrix.os }}
        path: |
          target/release/calculator-max${{ matrix.os == 'windows-latest' && '.exe' || '' }}

    - name: Package macOS artifact
      if: matrix.os == 'macos-latest'
      run: |
        cd target/release
        zip -r calculator-max-macos.zip calculator-max

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: calculator-max-macos
        path: target/bundle/osx/calculator-max-macos.zip